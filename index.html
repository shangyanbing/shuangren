<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霜刃对决 · 下载中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            /* ★★★ 已修正为 cover.jpg ★★★ */
            background-image: url('PAC/cover.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 0;
        }

        .download-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 48px 56px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .download-card:hover {
            transform: scale(1.02);
        }

        .download-card h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #1e2a3a;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(255, 255, 255, 0.3);
        }

        .download-card .sub {
            font-size: 1rem;
            color: #3a4a5e;
            opacity: 0.8;
            margin-bottom: 32px;
            border-bottom: 2px dashed rgba(0, 0, 0, 0.1);
            padding-bottom: 16px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 28px;
            border: none;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            color: #fff;
            background: #2c3e50;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
            cursor: pointer;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .btn:hover::after {
            opacity: 1;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-pc {
            background: linear-gradient(145deg, #1e6f9f, #0e4b6e);
        }

        .btn-pc:hover {
            background: linear-gradient(145deg, #2583b8, #135a82);
            box-shadow: 0 12px 28px rgba(30, 111, 159, 0.5);
            transform: translateY(-3px);
        }

        .btn-mobile {
            background: linear-gradient(145deg, #1f8b4c, #0f5e32);
        }

        .btn-mobile:hover {
            background: linear-gradient(145deg, #26a05a, #14733d);
            box-shadow: 0 12px 28px rgba(31, 139, 76, 0.5);
            transform: translateY(-3px);
        }

        .btn .icon {
            font-size: 1.8rem;
            line-height: 1;
        }

        .file-meta {
            display: block;
            font-size: 0.75rem;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .footer-note {
            margin-top: 28px;
            font-size: 0.8rem;
            color: #4a5a6e;
            opacity: 0.6;
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            padding-top: 18px;
        }

        @media (max-width: 480px) {
            .download-card {
                padding: 32px 20px;
                border-radius: 32px;
            }
            .download-card h1 {
                font-size: 1.8rem;
            }
            .btn {
                font-size: 1.0rem;
                padding: 14px 20px;
            }
            .btn .icon {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="download-card">
        <h1>⚔️ 霜刃对决</h1>
        <div class="sub">选择你的平台，立即下载</div>

        <div class="button-group">
            <a href="PAC/霜刃对决.zip" download class="btn btn-pc">
                <span class="icon">🖥️</span>
                电脑版
                <span class="file-meta">.zip · 点击下载</span>
            </a>

            <a href="PAC/霜刃对决.apk" download class="btn btn-mobile">
                <span class="icon">📱</span>
                手机版
                <span class="file-meta">.apk · 点击下载</span>
            </a>
        </div>

        <div class="footer-note">
            📁 所有文件均位于 <strong>PAC</strong> 文件夹 · 背景图 cover.jpg
        </div>
    </div>
</body>
</html>
