<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>商砚冰游戏</title>
  <style>
    /* 全局重置 & 性能优化：开启GPU加速，减少重绘回流 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-touch-callout: none;
    }
    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      padding: 12px;
      transform: translateZ(0);
    }
    .game-container {
      max-width: 720px;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #1a1a1a;
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      overflow: hidden;
      position: relative;
      touch-action: manipulation;
      transform: translateZ(0);
      will-change: transform;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      transform: translateZ(0);
    }
    #coverVideo {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #111;
      pointer-events: none;
      will-change: opacity;
      transform: translateZ(0);
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    /* 特效视频强制最高层级，确保完全覆盖底层 */
    #specialVideo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none;
      will-change: opacity, visibility;
      transform: translateZ(0);
      z-index: 5;
      opacity: 0;
      visibility: hidden;
    }
    /* 透明交互层 */
    .interaction-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      touch-action: manipulation;
      cursor: default;
      z-index: 10;
    }
    .zone {
      flex: 1;
      width: 100%;
      touch-action: manipulation;
      transition: none;
    }
    .zone:active {
      background: rgba(255, 255, 255, 0.03);
    }
    .game-title {
      position: absolute;
      top: 18px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
      font-size: 1.5rem;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.9);
      z-index: 20;
      pointer-events: none;
      font-family: 'Trebuchet MS', 'PingFang SC', sans-serif;
      padding: 0 16px;
      backdrop-filter: none;
    }
    @media (max-width: 480px) {
      .game-title {
        font-size: 1.2rem;
        top: 12px;
      }
    }
    .zone,
    .video-wrapper {
      -webkit-tap-highlight-color: transparent;
    }
    /* 背景音乐控件 - 左下角 */
    .music-control {
      position: absolute;
      bottom: 18px;
      left: 18px;
      z-index: 30;
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 12px 6px 10px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      gap: 8px;
      color: #eee;
      font-size: 0.8rem;
      pointer-events: auto;
      cursor: pointer;
      transition: background 0.1s;
    }
    .music-control:hover {
      background: rgba(0, 0, 0, 0.75);
    }
    .music-control svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .music-control .status-text {
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    @media (max-width: 480px) {
      .music-control {
        bottom: 12px;
        left: 12px;
        padding: 4px 10px 4px 8px;
        font-size: 0.7rem;
      }
      .music-control svg {
        width: 15px;
        height: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="video-wrapper">
      <!-- 底层循环视频 -->
      <video id="coverVideo" src="VIDEO/cover.mp4" playsinline loop preload="auto"></video>
      <!-- 顶层特效视频（固定最高层级） -->
      <video id="specialVideo" playsinline preload="auto"></video>
      <!-- 交互层 -->
      <div class="interaction-overlay" id="interactionOverlay">
        <div class="zone" id="zoneHead" data-zone="head"></div>
        <div class="zone" id="zoneStomach" data-zone="stomach"></div>
        <div class="zone" id="zoneLeg" data-zone="leg"></div>
      </div>
      <!-- 标题 -->
      <div class="game-title">商砚冰游戏</div>
      <!-- 音乐控制 -->
      <div class="music-control" id="musicControl" title="点击切换音乐">
        <svg viewBox="0 0 24 24" id="musicIcon">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />
        </svg>
        <span class="status-text" id="musicStatus">音乐 开</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      "use strict";
      // DOM 引用
      const coverVideo = document.getElementById('coverVideo');
      const specialVideo = document.getElementById('specialVideo');
      const overlay = document.getElementById('interactionOverlay');
      // 背景音乐
      const bgMusic = new Audio('VIDEO/music.mp3');
      bgMusic.loop = true;
      bgMusic.volume = 0.5;
      // 音乐UI
      const musicControl = document.getElementById('musicControl');
      const musicStatus = document.getElementById('musicStatus');
      const musicIcon = document.getElementById('musicIcon');
      // 视频映射
      const VIDEO_BASE = 'VIDEO/';
      const VIDEO_MAP = {
        head: 'head.mp4',
        stomach: 'stomach.mp4',
        leg: 'leg.mp4',
        combo: 'combo.mp4'
      };
      // 全局状态
      let isPlayingSpecial = false;
      let timerId = null;
      let longPressTimer = null;
      let isLongPressTriggered = false;
      let isMusicPlaying = false;

      // 清空所有计时器
      function clearAllTimers() {
        if (timerId) clearTimeout(timerId);
        if (longPressTimer) clearTimeout(longPressTimer);
        timerId = null;
        longPressTimer = null;
      }

      // 音乐控制
      function toggleMusic() {
        if (isMusicPlaying) {
          bgMusic.pause();
          isMusicPlaying = false;
          musicStatus.textContent = '音乐 关';
          musicIcon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" /><path d="M4 17L20 5" stroke="currentColor" stroke-width="2" />';
        } else {
          bgMusic.play().catch(e => console.warn('音乐播放失败:', e));
          isMusicPlaying = true;
          musicStatus.textContent = '音乐 开';
          musicIcon.innerHTML = '<path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" />';
        }
      }
      function tryAutoPlayMusic() {
        bgMusic.play().then(() => {
          isMusicPlaying = true;
          musicStatus.textContent = '音乐 开';
        }).catch(() => {
          isMusicPlaying = false;
          musicStatus.textContent = '音乐 关';
        });
      }
      musicControl.addEventListener('click', e => {
        e.stopPropagation();
        toggleMusic();
      });

      // 【修复核心】恢复底层背景视频，彻底清理特效残留画面
      function resumeCover() {
        // 隐藏特效视频，双重控制杜绝画面残留
        specialVideo.style.opacity = '0';
        specialVideo.style.visibility = 'hidden';
        specialVideo.pause();
        specialVideo.currentTime = 0;
        specialVideo.src = ''; // 清空视频源，消除最后一帧残影
        // 恢复底层循环视频
        coverVideo.style.display = 'block';
        if (coverVideo.paused) coverVideo.play().catch(() => {});
        isPlayingSpecial = false;
      }

      // 【修复核心】播放特效，完全盖住底层视频
      function playSpecialVideo(zoneType) {
        if (isPlayingSpecial) return;
        const videoFile = VIDEO_MAP[zoneType];
        if (!videoFile) return;

        clearAllTimers();
        isPlayingSpecial = true;

        // 暂停并隐藏底层视频，保证特效完全覆盖
        coverVideo.pause();
        coverVideo.style.display = 'none';

        // 加载并显示顶层特效视频
        specialVideo.src = VIDEO_BASE + videoFile;
        specialVideo.style.opacity = '1';
        specialVideo.style.visibility = 'visible';
        specialVideo.currentTime = 0;
        specialVideo.play().catch(() => resumeCover());

        // 播放结束回调
        specialVideo.onended = () => {
          specialVideo.onended = null;
          resumeCover();
        };
        specialVideo.onerror = () => {
          specialVideo.onerror = null;
          resumeCover();
        };
      }

      // 长按连击
      function startLongPressDetection() {
        if (isPlayingSpecial) return;
        clearTimeout(longPressTimer);
        longPressTimer = setTimeout(() => {
          isLongPressTriggered = true;
          playSpecialVideo('combo');
        }, 600);
      }
      function cancelLongPressDetection() {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }

      // 区域点击事件
      function attachZoneEvents(zoneElement, zoneType) {
        if (!zoneElement) return;
        let pointerDownTime = 0;
        let isPointerDown = false;

        zoneElement.addEventListener('pointerdown', e => {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          pointerDownTime = Date.now();
          isPointerDown = true;
          startLongPressDetection();
        }, { passive: true });

        zoneElement.addEventListener('pointerup', e => {
          if (e.pointerType === 'mouse' && e.button !== 0) return;
          if (!isPointerDown) return;
          isPointerDown = false;
          cancelLongPressDetection();
          const elapsed = Date.now() - pointerDownTime;
          if (!isLongPressTriggered && elapsed < 600 && !isPlayingSpecial) {
            playSpecialVideo(zoneType);
          }
          isLongPressTriggered = false;
        }, { passive: true });

        zoneElement.addEventListener('pointerleave', () => {
          isPointerDown = false;
          cancelLongPressDetection();
        }, { passive: true });

        zoneElement.addEventListener('contextmenu', e => e.preventDefault());
      }

      attachZoneEvents(document.getElementById('zoneHead'), 'head');
      attachZoneEvents(document.getElementById('zoneStomach'), 'stomach');
      attachZoneEvents(document.getElementById('zoneLeg'), 'leg');

      // 初始化
      coverVideo.play().catch(() => {});
      tryAutoPlayMusic();

      // 页面切换可见性处理
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          if (isMusicPlaying && bgMusic.paused) bgMusic.play();
          if (!isPlayingSpecial && coverVideo.paused) coverVideo.play();
        } else {
          coverVideo.pause();
          specialVideo.pause();
        }
      });

      // 首次交互唤醒音频
      function firstUserTouch() {
        if (!isMusicPlaying) toggleMusic();
        document.removeEventListener('pointerdown', firstUserTouch);
        document.removeEventListener('touchstart', firstUserTouch);
      }
      document.addEventListener('pointerdown', firstUserTouch, { once: true, passive: true });
      document.addEventListener('touchstart', firstUserTouch, { once: true, passive: true });

      // 页面卸载释放资源
      window.addEventListener('beforeunload', () => {
        clearAllTimers();
        bgMusic.pause();
        coverVideo.pause();
        specialVideo.pause();
      });
    })();
  </script>
</body>
</html>
